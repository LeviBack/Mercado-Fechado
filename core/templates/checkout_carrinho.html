{% extends 'base.html' %}
{% block conteudo %}

        <h1 class="display-5 fs-1 mb-4">Preço dos produtos no seu carrinho:</h1>
        <div class="row">
            <div class="col-md-4">
                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title">R${{total}}</h5>
                    </div>
                </div>
            </div>
        </div>
        <a href="{% url 'pagamento' %}" class="btn btn-success ms-2">Pagamento</a>
    </div>
{% endblock %}
