{% extends 'base.html' %}
{% block conteudo %}
     <div class="container mt-5 bg-light rounded-3">
        <h1 class="display-5 fs-1">Login:</h1>
        <form action="" method="post">

            {% csrf_token %}

            <div class="input-group mb-3">
                <input type="text" name="username" id="" placeholder="Seu nome" class="form-control">
            </div>

            <div class="input-group mb-3">
                <input type="password" name="password" id="" placeholder="Sua senha" class="form-control">
            </div>

            <button type="submit" class="btn bg-primary-subtle">Fazer Login</button>

        </form>
     </div>
{% endblock %}
