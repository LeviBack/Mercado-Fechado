{% extends 'base.html' %}
{% block conteudo %}
    <h1 class="fs-1 fw-bold">Olá {{request.user.username}}</h1>
    <div class="container mt-5 bg-light rounded-3">
        <form action="" method="post">
            {% csrf_token %}

            <h1 class="fs-1">Adicionar produto</h1>
            <div class="input-group">
                <input type="text" name="nome_produto" id="" class="form-control mb-3" placeholder="Nome do produto a ser adicionado">
            </div>
            <div class="input-group">
                <input type="text" name="descricao_produto" id="" class="form-control mb-3" placeholder="Descrição do produto a ser vendido">
            </div>
            <div class="input-group">
                <input type="number" name="preco_produto" id="" class="form-control mb-3" placeholder="Preço do produto a ser vendido">
            </div>
            <div class="input-group">
                <input type="radio" name="ativo_produto" id="" class="form=control mb-3" value="ativo">Ativo
            </div>
            <button type="submit" class="btn btn-primary">Adicionar</button>
        </form>
    </div>
{% endblock %}
