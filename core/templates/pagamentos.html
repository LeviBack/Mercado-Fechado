{% extends 'base.html' %}
{% block conteudo %}

            <h1 class="display-5 fs-1 fw-bold">O preço total para se pagar foi de {{total}}</h1>
            <form action="" method="post">

                {% csrf_token %}
                
                <div class="form-group mb-3">
                    <input type="radio" name="pagamento" id="" value="pix">PIX
                </div>

                <div class="form-group mb-3">
                    <input type="radio" name="pagamento" id="" value="cartao">CARTAO
                </div>

                <button type="submit" class="btn btn-success">Finalizar compra</button>
            </form>
{% endblock %}
