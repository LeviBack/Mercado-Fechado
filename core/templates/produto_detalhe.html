{% extends 'base.html' %}
{% block conteudo %}

<div class="container mt-5 bg-light rounded-3">
    <div class="card p-4">
        <h1>{{produto.nome}}</h1>
        <p class="mt-3">{{produto.descricao}}</p>
        <h3 class="mt-3">{{produto.preco}}</h3>
        <div class="d-flex">
            <a href="{% url 'produtos' %}" class="btn btn-secondary">Voltar</a>
            <a href="{% url 'comprar_produto' produto.id %}" class="btn btn-success">Comprar</a>
        </div>
    </div>
</div>

{% endblock %}
